apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-api
  namespace: assessment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-api
  template:
    metadata:
      labels:
        app: customer-api
    spec:
      containers:
        - name: customer-api
          image: customer-api:assessment
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: customer-api-config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 200
            periodSeconds: 2
            failureThreshold: 5
