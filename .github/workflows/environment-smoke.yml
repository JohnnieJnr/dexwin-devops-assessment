name: Assessment environment smoke test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: environment-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: bash -n scripts/*.sh tests/*.sh

      - name: Test prerequisite diagnostics
        run: ./tests/doctor-test.sh

      - name: Test application
        run: npm test
        working-directory: app

      - name: Build and test the prepared Dev Container
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: ./tests/environment-smoke.sh
