name: Release assessment service

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test application
        run: npm test
        working-directory: app

      - name: Build image
        run: docker build -t customer-api:latest ./app

      - name: Deploy
        run: kubectl apply -f kubernetes/
